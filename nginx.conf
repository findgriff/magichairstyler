server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip compression
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/xml application/xml+rss application/json application/javascript application/x-javascript image/svg+xml;

    # security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "interest-cohort=()" always;

    # long-cache static assets
    location ~* \.(?:webp|png|jpe?g|gif|svg|woff2?|ttf|eot|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # short cache for xml, html so content can update
    location ~* \.(?:html|xml)$ {
        expires 10m;
        add_header Cache-Control "public, max-age=600";
    }

    location = /robots.txt  { log_not_found off; access_log off; }
    location = /sitemap.xml { log_not_found off; access_log off; }
    location = /favicon.ico { log_not_found off; access_log off; }

    # SPA-style fallback (everything falls back to index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # basic 404 fallback
    error_page  404  /index.html;

    # prevent access to hidden files
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
